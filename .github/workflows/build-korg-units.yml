name: Build Korg Units

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out SDK
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: |
          cd docker
          ./build_image.sh

      - name: Build NTS-3 dummy effect
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            logue-sdk-dev-env:latest \
            bash -c "cd /workspace && build nts-3_kaoss/dummy-genericfx"

      - name: Build microKORG2 dummy delay effect
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            logue-sdk-dev-env:latest \
            bash -c "cd /workspace && build microkorg2/dummy-delfx"

      - name: Upload built units
        uses: actions/upload-artifact@v4
        with:
          name: korg-built-units
          path: |
            platform/nts-3_kaoss/dummy-genericfx/*.nts3unit
            platform/microkorg2/dummy-delfx/*.mk2unit
